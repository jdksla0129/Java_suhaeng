spring:
  application:
    name: demo

  h2:
    console:
      enabled: true
    datasource:
      driver-class-name: org.h2.Driver
      jdbc-url: jdbc:h2:~/tomato
      username: sa
      password:
    jpa:
      hibernate:
        ddl-auto: update
      show-sql: true
      properties:
        hibernate:
          format_sql: true
      database-platform: org.hibernate.dialect.H2Dialect